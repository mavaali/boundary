name: weekly-repo-review
schedule: "weekly mon 09:00"
persona: researcher
workspace: examples/workspaces/sample-repo

envelope:
  writable_paths:
    - scratch/weekly-review-{date}.md
  max_writes: 3
  min_writes: 1
  require_staging: true
  max_unstaged_reads: 3
  max_iters: 25
  max_dollars: 0.50
  max_wall_seconds: 600

on_ambiguity: queue
on_failure: digest
notify: digest_daily

task: |
  Weekly repository review.

  Survey the repository for recent documentation and implementation changes.
  Start with README/GUIDE files, then targeted source paths, then general grep as
  fallback.

  Produce:
  - 3-5 notable changes or risks
  - files that support each finding
  - one recommended follow-up, if any

  Label every claim [DATA] (tool result here) / [TRAINING] / [HYPOTHESIS].

  Write to the allowed path. Verify by reading back. End with a 3-bullet summary —
  each bullet must cite at least one [DATA] tool result.

name: selftest

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Unit + red-team tests
        run: pytest -q

      - name: Envelope selftest (fails on any guarantee regression)
        run: boundary selftest
